# ─────────────────────────────────────────────
# SASAudit Configuration
# ─────────────────────────────────────────────
# Values set here apply to every repo by default.
# Any value can be overridden inside a specific [repo.Name] block.

[defaults]
user_id          = "N/A"
cost_center      = "739"
program_supported = "CE"
business_process = "CE Processing"  # e.g. Collection, Estimation, Publication
output           = "./output"
exclude          = []


# ─────────────────────────────────────────────
# Repositories
# ─────────────────────────────────────────────
# Each entry is [repo.Name].
# `source` is required — either a local folder path or a Git URL (SSH or HTTPS).
# `branch` is optional — defaults to the repo's default branch.
# `extra_dependencies` is optional — list of other repos to scan for cross-repo SAS dependencies.
# `exclude` is optional — list of glob patterns to skip (e.g. ["*.for", "temp/*"]).

[repo.EES]
source              = "git@cfgitlabprd01v.psb.bls.gov:dceis/dceis-ees.git"
business_process    = "Estimation"
extra_dependencies  = ["git@cfgitlabprd01v.psb.bls.gov:dceis/shared.git"]
exclude             = ["*.for"]

[repo.IES]
source              = "git@cfgitlabprd01v.psb.bls.gov:dceis/ies.git"
business_process    = "Estimation"
extra_dependencies  = ["git@cfgitlabprd01v.psb.bls.gov:dceis/shared.git"]

[repo.Shared]
source              = "git@cfgitlabprd01v.psb.bls.gov:dceis/shared.git"
business_process    = "Estimation, Publication"

[repo.Pubs_Microdata]
source              = "git@cfgitlabprd01v.psb.bls.gov:dceis/pubs.git"
business_process    = "Publications"
extra_dependencies  = ["git@cfgitlabprd01v.psb.bls.gov:dceis/shared.git"]