# ─────────────────────────────────────────────
# SAS Inventory Configuration
# ─────────────────────────────────────────────
# Values set here apply to every repo by default.
# Any value can be overridden inside a specific [repo.Name] block.

[defaults]
output              = "./output"

"User ID"           = "N/A"
"Cost Center"       = "739"
"Program Supported" = "CE"
"Business Process"  = ""  # e.g. Collection, Estimation, Publication



# ─────────────────────────────────────────────
# Repositories
# ─────────────────────────────────────────────
# Each entry is [repo.Name].
# `source` is required — either a local folder path or a Git URL (SSH or HTTPS).
# `branch` is optional — defaults to the repo's default branch.
# `extra_dependencies` is optional — list of other repos to scan for cross-repo SAS dependencies.
# `exclude` is optional — list of glob patterns to skip (e.g. ["*.for", "temp/*"]).

[repo.EES]
source              = "git@cfgitlabprd01v.psb.bls.gov:dceis/dceis-ees.git"
extra_dependencies  = ["git@cfgitlabprd01v.psb.bls.gov:dceis/dceis-shared.git"]
exclude             = ["*.for"]
"Business Process"    = "Estimation"

[repo.IES]
source              = "git@cfgitlabprd01v.psb.bls.gov:dceis/dceis-ies.git"
extra_dependencies  = ["git@cfgitlabprd01v.psb.bls.gov:dceis/dceis-shared.git"]
"Business Process"    = "Estimation"

[repo.Shared]
source              = "git@cfgitlabprd01v.psb.bls.gov:dceis/dceis-shared.git"
"Business Process"    = "Estimation, Publication"

[repo.Pubs_Microdata]
source              = "git@cfgitlabprd01v.psb.bls.gov:dceis/dceis-pubs.git"
extra_dependencies  = ["git@cfgitlabprd01v.psb.bls.gov:dceis/dceis-shared.git"]
"Business Process"   = "Publication"